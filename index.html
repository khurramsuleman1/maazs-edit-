<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Black Aesthetics</title>
    <meta name="description" content="Where beauty is etched into art." />
    <link rel="icon" href="/favicon.svg" />
    <style>
      :root {
        --ink: #10100e;
        --muted: rgba(246, 240, 230, 0.68);
        --line: rgba(244, 226, 190, 0.24);
        --glass: rgba(13, 11, 9, 0.58);
        --gold: #d6a95e;
        --concrete: #5d503f;
        --near-white: #f4f4f2;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        background: #5d503f;
        color: #f7f0e6;
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      button, input, a { font: inherit; }
      button, a { -webkit-tap-highlight-color: transparent; }
      #app { position: fixed; inset: 0; }
      /* Intro splash: BA logo on near-white (ba_spec_v2 §4) */
      #splash {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: var(--near-white); z-index: 10; transition: none;
      }
      #splash img {
        width: min(220px, 42vw);
        height: auto;
        display: block;
      }
      #ui {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }
      #ui [hidden] { display: none !important; }
      #ui button, #ui a, #ui input { pointer-events: auto; }
      .hud-top {
        position: fixed;
        top: 26px;
        left: 30px;
        right: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .brand {
        width: 72px;
        height: 72px;
        border: 1px solid rgba(255, 236, 204, 0.18);
        border-radius: 11px;
        background: rgba(5, 5, 5, 0.9);
        cursor: pointer;
        backdrop-filter: blur(16px);
        display: grid;
        place-items: center;
        padding: 11px;
      }
      .brand img { filter: invert(1); }
      .brand img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .hud-actions, .viewer-controls, .buy-row, .variant-row {
        display: flex;
        gap: 9px;
        align-items: center;
      }
      .icon-button, .viewer-controls button, .chip, .search-pill {
        min-width: 42px;
        height: 42px;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: var(--glass);
        color: #fff5e8;
        cursor: pointer;
        backdrop-filter: blur(16px);
      }
      .search-pill {
        min-width: 236px;
        justify-content: flex-start;
        display: inline-flex;
        gap: 18px;
        align-items: center;
        padding: 0 24px;
        border-radius: 999px;
        font-size: 18px;
        color: rgba(255, 244, 226, 0.9);
      }
      .search-pill span { font-size: 24px; line-height: 1; }
      .icon-button:hover, .viewer-controls button:hover, .chip:hover,
      .category-rail button:hover, .filter-strip button:hover {
        border-color: rgba(255, 246, 224, 0.58);
      }
      .home-copy {
        display: block;
        position: fixed;
        left: 30px;
        bottom: 116px;
        max-width: 360px;
        color: #f7efe2;
        text-shadow: 0 2px 22px rgba(0, 0, 0, 0.72);
      }
      .home-copy p, .eyebrow {
        font-size: 11px;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: var(--gold);
      }
      .home-copy h1 {
        margin-top: 9px;
        font-size: 34px;
        line-height: 1.02;
        font-weight: 560;
        letter-spacing: 0.005em;
      }
      .home-copy span {
        display: block;
        margin-top: 12px;
        font-size: 14px;
        color: rgba(247, 239, 226, 0.78);
      }
      .category-rail {
        position: fixed;
        left: 50%;
        bottom: 30px;
        transform: translateX(-50%);
        display: flex;
        gap: 0;
        padding: 12px 18px;
        border: 1px solid rgba(255, 226, 186, 0.18);
        border-radius: 26px;
        background: rgba(18, 15, 12, 0.66);
        backdrop-filter: blur(22px);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      }
      .category-rail button, .filter-strip button {
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: rgba(255, 239, 214, 0.86);
        padding: 10px 28px;
        cursor: pointer;
        white-space: nowrap;
      }
      .category-rail button {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        border-right: 1px solid rgba(255, 226, 186, 0.18);
        border-radius: 0;
        font-size: 18px;
      }
      .category-rail button:last-child { border-right: 0; }
      .nav-icon {
        color: var(--gold);
        font-size: 24px;
        line-height: 1;
      }
      .category-rail button.is-active, .filter-strip button.is-active {
        border-color: transparent;
        color: #fff7e8;
        background: transparent;
        box-shadow: inset 0 -3px 0 var(--gold);
      }
      .category-panel {
        position: fixed;
        left: 28px;
        top: 118px;
        width: min(320px, calc(100vw - 56px));
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(255, 236, 204, 0.16);
        background: rgba(12, 10, 8, 0.42);
        color: #fff0d8;
        backdrop-filter: blur(18px);
      }
      .category-panel h2, .product-panel h2 {
        margin-top: 8px;
        font-size: 28px;
        line-height: 1.05;
        font-weight: 520;
      }
      .intro {
        margin-top: 11px;
        color: rgba(247, 240, 224, 0.82);
        font-size: 14px;
        line-height: 1.55;
      }
      .filter-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 16px;
      }
      .text-link {
        border: 0;
        background: transparent;
        color: currentColor;
        cursor: pointer;
        padding: 0 0 10px;
      }
      .product-panel, .search-panel {
        position: fixed;
        right: 30px;
        top: 118px;
        width: min(360px, calc(100vw - 56px));
        padding: 18px;
        border: 1px solid rgba(255, 226, 186, 0.18);
        border-radius: 18px;
        background: rgba(13, 11, 9, 0.62);
        color: #fff6e8;
        backdrop-filter: blur(22px);
      }
      .product-panel { top: auto; bottom: 118px; }
      .product-panel .eyebrow { color: rgba(255, 246, 232, 0.6); }
      .price {
        margin-top: 10px;
        color: var(--gold);
      }
      .variant-row {
        margin-top: 18px;
      }
      .chip.is-active, .viewer-controls button.is-active {
        border-color: var(--gold);
        color: #fff9e8;
      }
      .buy-row { margin-top: 18px; }
      .buy, .whatsapp {
        display: inline-grid;
        place-items: center;
        height: 42px;
        border: 1px solid rgba(255, 246, 232, 0.36);
        border-radius: 6px;
        color: #fff6e8;
        text-decoration: none;
      }
      .buy {
        flex: 1;
        background: rgba(255, 246, 232, 0.12);
      }
      .whatsapp {
        width: 48px;
      }
      .viewer-controls {
        position: fixed;
        left: 30px;
        bottom: 30px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(13, 11, 9, 0.62);
        backdrop-filter: blur(16px);
      }
      #ui[data-mode="product"] .category-rail { display: none; }
      .search-panel label {
        display: grid;
        gap: 8px;
        color: rgba(255, 246, 232, 0.72);
      }
      .search-panel input {
        width: 100%;
        border: 1px solid rgba(255, 246, 232, 0.25);
        background: rgba(255, 255, 255, 0.08);
        color: white;
        padding: 12px;
        outline: none;
      }
      .search-results {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }
      .search-results button {
        display: grid;
        gap: 4px;
        border: 1px solid rgba(255, 246, 232, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: #fff6e8;
        padding: 11px;
        text-align: left;
        cursor: pointer;
      }
      .search-results small { color: rgba(255, 246, 232, 0.58); }
      @media (max-width: 760px) {
        .hud-top { top: 14px; left: 14px; right: 14px; }
        .brand { width: 58px; height: 58px; }
        .search-pill { min-width: 0; width: 48px; padding: 0; justify-content: center; font-size: 0; }
        .search-pill span { font-size: 22px; }
        .home-copy {
          left: 16px;
          right: 16px;
          bottom: 116px;
          max-width: none;
        }
        .home-copy h1 { font-size: 24px; }
        .category-rail {
          width: calc(100vw - 24px);
          overflow-x: auto;
          justify-content: flex-start;
          bottom: 16px;
          border-radius: 18px;
          padding: 9px 10px;
        }
        .category-rail button { font-size: 14px; padding: 9px 15px; }
        .nav-icon { font-size: 18px; }
        .category-panel, .product-panel, .search-panel {
          left: 14px;
          right: 14px;
          top: auto;
          bottom: 82px;
          width: auto;
          padding: 16px;
        }
        .product-panel {
          top: 74px;
          bottom: auto;
          background: rgba(13, 13, 11, 0.34);
        }
        .product-panel h2 { font-size: 22px; }
        .viewer-controls {
          left: 14px;
          bottom: 16px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="splash"><img src="/logo-blackaesthetics.svg" alt="Black Aesthetics" /></div>
    <main id="ui"><!-- HTML overlay (HUD, panels) — pointer-events only on interactive zones --></main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
